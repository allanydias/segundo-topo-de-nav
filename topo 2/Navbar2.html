<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB EletroRotas 2</title>

    <link rel="stylesheet" href="Navbar2.css">
</head>
<body>

    <header>
        <nav id="NavbarAmarelo">
            <div class="containerHeader">
                <div class="logo">
                    <img src="./assets/LogoBancoDoBrasil.png" alt="logo do Banco Do Brasil" id="logoBB">
                    <div class="textoLogo">
                        <h3>Banco Do Brasil</h3>
                    </div>
                </div>
            
                <div class="links">
                    <a href="#">Para Você</a>
                    <a href="#">Para Empresas</a>
                    <a href="#">Agronegócios</a>
                    <a href="#">Setor Público</a>
                </div>
            
                <div class="acoesUsuario">
                    <div class="busca">
                        <img src="./assets/IconeLupa.png" alt="Ícone de lupa" id="iconeLupa">
                        <input type="text" placeholder="Busque no site" class="search" >
                    </div>

                    <button id="butaoLogin"> 
                        <img src="./assets/iconeUsuario.png" alt="Ícone de cadeiado para o login" id="iconeLogin"> Acesse sua conta
                    </button>             
                </div>
            </div> 
        </nav>
        
        <nav id="NavbarAzul">
            <div class="containerHeader">
              <div class="linksAzul">
                    <a href="#">Produtos e Serviços</a>
                    <a href="#">Soluções Digitais</a>
                    <a href="#">Atendimento</a>
                    <a href="#">Sobre o BB</a>
                </div>
            
                <div class="hashtag">
                    <h4>#PraTudoQueVoceImaginar</h4>
                </div>
            
            </div>
        </nav>
    </header>
</body>
</html>
